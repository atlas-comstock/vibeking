# fly launch --config infra/fly/api.toml
app = "vibeking-api-staging"
primary_region = "sin"

[build]
  dockerfile = "../../apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  WISH_PLATFORM_ENABLED = "true"
  CLAIMS_ENABLED = "true"
  SITE_BASE_DOMAIN = "staging.vibeking.dev"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"